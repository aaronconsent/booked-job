<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>Booked Job — Authorization</title>
<style>
  body{font-family:system-ui,sans-serif;background:#15171A;color:#F4F2EE;margin:0;min-height:100vh;display:grid;place-items:center;padding:24px}
  .card{max-width:560px;width:100%;background:#1E2227;border:1px solid #2A2F36;border-radius:16px;padding:32px;text-align:center}
  .mark{width:54px;height:54px;border-radius:12px;background:#FF6A00;display:grid;place-items:center;font-family:Impact,sans-serif;color:#15171A;font-size:34px;margin:0 auto 14px;transform:skewX(-6deg)}
  h1{font-size:20px;margin:0 0 6px}
  p{color:#A9AEB5;font-size:14px;line-height:1.5}
  .code{margin:18px 0;background:#0F1113;border:1px solid #2A2F36;border-radius:10px;padding:16px;font-family:ui-monospace,monospace;font-size:14px;word-break:break-all;color:#FF8A2B}
  button{background:#FF6A00;color:#fff;border:0;font-weight:700;font-size:15px;padding:12px 22px;border-radius:10px;cursor:pointer}
  button:hover{background:#FF8A2B}
  .err{color:#fca5a5}
</style>
</head>
<body>
<div class="card">
  <div class="mark">B</div>
  <h1 id="title">Authorized 🛠️</h1>
  <p id="msg">Copy the code below and paste it back to your assistant to finish connecting.</p>
  <div class="code" id="code">…</div>
  <button id="copy" onclick="copyCode()">Copy code</button>
</div>
<script>
  var params = new URLSearchParams(window.location.search);
  var code = params.get('code'), err = params.get('error');
  var codeEl = document.getElementById('code');
  if (err) {
    document.getElementById('title').textContent = 'Authorization error';
    document.getElementById('title').className = 'err';
    document.getElementById('msg').textContent = 'Try again, or tell your assistant: ' + err;
    codeEl.textContent = err;
    document.getElementById('copy').style.display = 'none';
  } else if (code) {
    codeEl.textContent = code;
  } else {
    codeEl.textContent = '(no code in URL)';
  }
  function copyCode(){ navigator.clipboard.writeText(code||''); document.getElementById('copy').textContent='Copied ✓'; }
</script>
</body>
</html>
